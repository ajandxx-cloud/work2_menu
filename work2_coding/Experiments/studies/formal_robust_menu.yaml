    - run_mode
    - policy_tag
    - product_mode
    - time_window_mode
    - menu_mode
    - pricing_mode
    - method
    - candidate_id
    - seed
    - data_seed
    - data_seed_test
    - split_id
    - trace_id
    - trace_hash
    - manifest_hash
    - settings_hash
