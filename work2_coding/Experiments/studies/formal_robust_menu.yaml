schema_version: 1
name: formal_robust_menu
tier: formal
run_mode: formal
description: Formal Work2 robust-menu contract for Phase 4 evidence generation.
shared_checkpoint:
  required: true
  path: outputs/shared_training/work2_robust_menu/formal/supervised_ml.pt
  expected_status: loaded
base_args:
  algo_name: DSPO_Menu
  menu_mode: true
  run_mode: formal
  instance: RC
  load_data: true
  pricing: true
  max_episodes: 10
  max_steps_r: 100
  max_steps_p: 0.55
  reopt: 10000000
  hgs_reopt_time: 1.1
  hgs_final_time: 1.5
  menu_k: 3
  max_candidates: 10
  menu_exact_threshold: 8
  menu_exact_gap_threshold: 8
  checkpoint_path: outputs/shared_training/work2_robust_menu/formal/supervised_ml.pt
  require_checkpoint: true
  allow_checkpoint_mismatch: false
splits:
  - split_id: formal_rc_low_seed0
    seed: 301
    data_seed: 0
    data_seed_test: 1
    uptake_regime: low
    args_overrides:
      home_util: 3.8
      base_util: -2.8
      incentive_sens: -0.18
  - split_id: formal_rc_low_seed1
    seed: 302
    data_seed: 1
    data_seed_test: 0
    uptake_regime: low
    args_overrides:
      home_util: 3.8
      base_util: -2.8
      incentive_sens: -0.18
  - split_id: formal_rc_medium_seed0
    seed: 303
    data_seed: 0
    data_seed_test: 1
    uptake_regime: medium
    args_overrides:
      home_util: 3.2
      base_util: -2.0
      incentive_sens: -0.25
  - split_id: formal_rc_medium_seed1
    seed: 304
    data_seed: 1
    data_seed_test: 0
    uptake_regime: medium
    args_overrides:
      home_util: 3.2
      base_util: -2.0
      incentive_sens: -0.25
policies:
  - tag: full_display
  - tag: home_only
  - tag: nearest_heuristic
  - tag: top_k_cheapest
  - tag: min_lateness
  - tag: hard_filter
  - tag: no_filter_diagnostic
    diagnostic: true
    metadata:
      diagnostic: true
      note: Diagnostic upper-bound only; not an operational recommendation.
  - tag: robust_risk_adjusted
  - tag: robust_service_guarded
paired_fields:
  - seed
  - data_seed
  - data_seed_test
  - instance
  - load_data
  - pricing
  - hgs_reopt_time
  - hgs_final_time
  - reopt
  - checkpoint_path
  - require_checkpoint
  - menu_k
  - max_candidates
  - max_steps_r
  - max_steps_p
  - home_util
  - base_util
  - incentive_sens
varied_fields:
  - algo_name
  - menu_mode
  - menu_policy
  - menu_eta_filter_mode
  - menu_time_filtering
  - menu_objective_mode
  - menu_eta_chance_threshold
  - menu_eta_soft_penalty_lambda
  - service_quit_penalty
  - service_quit_rate_guardrail
  - menu_outside_penalty_lambda
  - menu_optout_guardrail
  - menu_selection_solver
  - menu_use_exact_eval
output_schema:
  normalized-row-v1: true
  fields:
    - study_name
    - run_id
    - policy_tag
    - seed
    - split_id
    - trace_id
    - manifest_hash
    - checkpoint_load_status
    - menu_k
    - filter_mode
    - effective_policy
    - acceptance_rate
    - optout_rate
    - placeholder_only

