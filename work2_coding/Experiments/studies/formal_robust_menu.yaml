schema_version: 1
name: formal_robust_menu
tier: formal
run_mode: formal
description: Formal V1 mainline comparison contract for Phase 4 evidence generation.
required_policy_tags:
  - mainline_no_menu
  - mainline_fixed_menu
  - mainline_random_menu
  - mainline_optimized_m
  - mainline_optimized_mw
  - mainline_optimized_fixed_window
  - mainline_optimized_adaptive
shared_checkpoint:
  required: true
  path: outputs/shared_training/work2_robust_menu/formal/supervised_ml.pt
  expected_status: loaded
base_args:
  algo_name: DSPO_Menu
  menu_mode: true
  product_mode: m+w+p
  time_window_mode: adaptive_window
  menu_contract_mode: optimized_menu
  menu_pricing_mode: lambertw
  run_mode: formal
  instance: RC
  load_data: true
  pricing: true
  max_episodes: 10
  max_steps_r: 100
  max_steps_p: 0.55
  reopt: 10000000
  hgs_reopt_time: 1.1
  hgs_final_time: 1.5
  menu_k: 3
  max_candidates: 10
  menu_exact_threshold: 8
  menu_exact_gap_threshold: 8
  checkpoint_path: outputs/shared_training/work2_robust_menu/formal/supervised_ml.pt
  require_checkpoint: true
  allow_checkpoint_mismatch: false
splits:
  - split_id: formal_mainline_low_seed0
    seed: 301
    data_seed: 0
    data_seed_test: 1
    uptake_regime: low
    args_overrides:
      home_util: 3.8
      base_util: -2.8
      incentive_sens: -0.18
  - split_id: formal_mainline_low_seed1
    seed: 302
    data_seed: 1
    data_seed_test: 0
    uptake_regime: low
    args_overrides:
      home_util: 3.8
      base_util: -2.8
      incentive_sens: -0.18
  - split_id: formal_mainline_medium_seed0
    seed: 303
    data_seed: 0
    data_seed_test: 1
    uptake_regime: medium
    args_overrides:
      home_util: 3.2
      base_util: -2.0
      incentive_sens: -0.25
  - split_id: formal_mainline_medium_seed1
    seed: 304
    data_seed: 1
    data_seed_test: 0
    uptake_regime: medium
    args_overrides:
      home_util: 3.2
      base_util: -2.0
      incentive_sens: -0.25
  - split_id: formal_mainline_medium_seed2
    seed: 305
    data_seed: 0
    data_seed_test: 1
    uptake_regime: medium
    args_overrides:
      home_util: 3.2
      base_util: -2.0
      incentive_sens: -0.25
policies:
  - tag: mainline_no_menu
  - tag: mainline_fixed_menu
  - tag: mainline_random_menu
  - tag: mainline_optimized_m
  - tag: mainline_optimized_mw
  - tag: mainline_optimized_fixed_window
  - tag: mainline_optimized_adaptive
paired_fields:
  - seed
  - data_seed
  - data_seed_test
  - instance
  - load_data
  - pricing
  - hgs_reopt_time
  - hgs_final_time
  - reopt
  - checkpoint_path
  - require_checkpoint
  - menu_k
  - max_candidates
  - max_steps_r
  - max_steps_p
  - home_util
  - base_util
  - incentive_sens
varied_fields:
  - algo_name
  - menu_mode
  - product_mode
  - time_window_mode
  - menu_contract_mode
  - menu_pricing_mode
  - menu_policy
  - menu_eta_filter_mode
  - menu_time_filtering
  - menu_objective_mode
