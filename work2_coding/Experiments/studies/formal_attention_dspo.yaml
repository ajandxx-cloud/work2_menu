schema_version: 1
name: formal_attention_dspo
tier: formal
run_mode: formal
comparison_family: attention_dspo
required_policy_tags:
  - DSPO_original
  - DSPO_attention
description: Formal held-out paired DSPO attention comparison contract.
shared_checkpoint:
  required: true
  path: outputs/shared_training/work2_attention_dspo/formal/supervised_ml.pt
  expected_status: loaded
base_args:
  algo_name: DSPO_Menu
  menu_mode: true
  run_mode: formal
  instance: RC
  load_data: true
  pricing: true
  max_episodes: 10
  max_steps_r: 100
  max_steps_p: 0.55
  reopt: 10000000
  hgs_reopt_time: 1.1
  hgs_final_time: 1.5
  menu_k: 3
  max_candidates: 10
  menu_exact_threshold: 8
  menu_exact_gap_threshold: 8
  menu_objective_mode: expected_profit
  checkpoint_path: outputs/shared_training/work2_attention_dspo/formal/supervised_ml.pt
  require_checkpoint: true
  allow_checkpoint_mismatch: false
splits:
  - split_id: formal_attention_rc_low_seed0
    seed: 311
    data_seed: 0
    data_seed_test: 1
    uptake_regime: low
    args_overrides:
      home_util: 3.8
      base_util: -2.8
      incentive_sens: -0.18
  - split_id: formal_attention_rc_low_seed1
    seed: 312
    data_seed: 1
    data_seed_test: 0
    uptake_regime: low
    args_overrides:
      home_util: 3.8
      base_util: -2.8
      incentive_sens: -0.18
  - split_id: formal_attention_rc_medium_seed0
    seed: 313
    data_seed: 0
    data_seed_test: 1
    uptake_regime: medium
    args_overrides:
      home_util: 3.2
      base_util: -2.0
      incentive_sens: -0.25
  - split_id: formal_attention_rc_medium_seed1
    seed: 314
    data_seed: 1
    data_seed_test: 0
    uptake_regime: medium
    args_overrides:
      home_util: 3.2
      base_util: -2.0
      incentive_sens: -0.25
policies:
  - tag: DSPO_original
  - tag: DSPO_attention
paired_fields:
  - seed
  - data_seed
  - data_seed_test
  - instance
  - load_data
  - pricing
  - hgs_reopt_time
  - hgs_final_time
  - reopt
  - checkpoint_path
  - require_checkpoint
  - menu_k
  - max_candidates
  - max_steps_r
  - max_steps_p
  - home_util
  - base_util
  - incentive_sens
  - menu_policy
  - menu_eta_filter_mode
  - menu_objective_mode
  - method_variant
  - attention_enabled
  - attention_mode
