schema_version: 1
name: smoke_robust_menu
tier: smoke
run_mode: smoke
description: Cheap contract-level smoke for robust time-window service-menu policies.
base_args:
  algo_name: DSPO_Menu
  menu_mode: true
  run_mode: smoke
  instance: RC
  load_data: true
  pricing: true
  max_episodes: 1
  max_steps_r: 2
  max_steps_p: 0.95
  reopt: 10000000
  hgs_reopt_time: 0.05
  hgs_final_time: 0.05
  menu_k: 3
  max_candidates: 6
  menu_exact_threshold: 6
  menu_exact_gap_threshold: 6
  checkpoint_path: ""
  require_checkpoint: false
  allow_checkpoint_mismatch: false
splits:
  - split_id: smoke_rc_medium_seed0
    seed: 101
    data_seed: 0
    data_seed_test: 1
    uptake_regime: medium
    args_overrides:
      home_util: 3.2
      base_util: -2.0
      incentive_sens: -0.25
policies:
  - tag: full_display
  - tag: home_only
  - tag: nearest_heuristic
  - tag: top_k_cheapest
  - tag: min_lateness
  - tag: hard_filter
  - tag: no_filter_diagnostic
    diagnostic: true
    metadata:
      diagnostic: true
      note: ETA pruning disabled only; routing and capacity feasibility remain active.
  - tag: robust_risk_adjusted
  - tag: robust_service_guarded
  - tag: random_top_k
paired_fields:
  - seed
  - data_seed
  - data_seed_test
  - instance
  - load_data
  - pricing
  - hgs_reopt_time
  - hgs_final_time
  - reopt
  - checkpoint_path
  - require_checkpoint
  - menu_k
  - max_candidates
  - max_steps_r
  - max_steps_p
  - home_util
  - base_util
  - incentive_sens
varied_fields:
  - algo_name
  - menu_mode
  - menu_policy
  - menu_eta_filter_mode
  - menu_time_filtering
  - menu_objective_mode
  - menu_eta_chance_threshold
  - menu_eta_soft_penalty_lambda
  - service_quit_penalty
  - service_quit_rate_guardrail
  - menu_outside_penalty_lambda
  - menu_optout_guardrail
  - menu_selection_solver
  - menu_use_exact_eval
output_schema:
  normalized-row-v1: true
  fields:
    - study_name
    - run_id
    - policy_tag
    - seed
    - split_id
    - trace_id
    - manifest_hash
    - checkpoint_load_status
    - menu_k
    - filter_mode
    - effective_policy
    - acceptance_rate
    - optout_rate
    - placeholder_only

