name: r_main
title: R (Random) Instance Main Policy Comparison
type: policy_compare
description: >
  Main experiment on the R (Random) instance. Same policy set as rc_main,
  providing cross-instance validation. Splits 0/1 are bundled R-type instances.
reference_tag: full_display
reference_label: full display
reference_policy: offer_all_feasible_bundles
base_args:
  experiment_name: r_main
  instance: R
  load_data: true
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 12
  eval_episodes: 6
  menu_k: 3
policies:
  - menu_optimization
  - tag: menu_optimization_v2
    label: menu optimization v2
    policy: menu_optimization
    menu_k: 3
    args_overrides:
      menu_time_filtering: false
  - revenue_greedy
  - nearest_heuristic
  - top_k_cheapest
  - top_k_passenger_utility
splits:
  - id: r_0_to_1
    train_split: 0
    test_split: 1
  - id: r_1_to_0
    train_split: 1
    test_split: 0
