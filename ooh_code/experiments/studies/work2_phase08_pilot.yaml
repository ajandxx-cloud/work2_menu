name: work2_phase08_pilot
title: Work 2 Phase08 Pilot - Choice-Aware Decision Gate
type: policy_compare
description: >
  Three-seed RC pilot for the locked choice-aware Work 2 policy set. The
  output feeds only the phase-local decision artifacts, not manuscript claims.
reference_tag: full_display
reference_label: full display
reference_policy: offer_all_feasible_bundles
base_args:
  experiment_name: work2_phase08_pilot
  instance: RC
  load_data: true
  fraction_capacity_limited_meeting_points: 0
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 80
  eval_episodes: 20
  menu_k: 3
  candidate_meeting_points: 10
  max_candidates: 10
  menu_model: cnn_setmenu
  menu_selection_solver: exact
  menu_use_exact_eval: true
  menu_exact_threshold: 8
  menu_objective_mode: system_profit
  service_quit_penalty: 100.0
  service_quit_rate_guardrail: 0.4
  base_util: 1.0
  home_pickup_utility: 1.0
  outside_option_util: 0.0
  incentive_sens: -0.08
  menu_travel_time_weight: -0.0004
  menu_pickup_time_weight: -0.00025
  pref_window_half_width: 5000
  menu_eta_filter_mode: none
  menu_time_prediction_blend: 0.35
  menu_route_delay_lambda: 0.25
  menu_capacity_risk_lambda: 0.1
  cnn_aux_checkpoint: outputs/shared_training/work2_cnn2d_baselineseed0_55278aca/0/checkpoints/supervised_ml.pt
policies:
  - tag: nearest_L
    label: Nearest-L
    policy: nearest_heuristic
  - tag: cost_L
    label: Cost-L heuristic
    policy: cost_l_heuristic
  - tag: cnn_menu
    label: CNN-Menu
    policy: top_k_cheapest
  - tag: cnn_setmenu_net_current
    label: CNN-SetMenuNet current
    policy: menu_optimization
    args_overrides:
      menu_model: cnn_setmenu
      menu_objective_mode: current
      menu_route_delay_lambda: 0.0
      menu_capacity_risk_lambda: 0.0
  - tag: expected_profit_enumeration
    label: Expected-Profit Enumeration
    policy: expected_profit_enumeration
    args_overrides:
      menu_objective_mode: system_profit
  - tag: service_constrained_expected_profit
    label: Service-Constrained Expected-Profit
    policy: service_constrained_expected_profit
    args_overrides:
      menu_objective_mode: system_profit
  - tag: cost_oracle
    label: Cost Oracle
    policy: cost_oracle
  - tag: profit_oracle
    label: Profit Oracle
    policy: profit_oracle
    args_overrides:
      menu_objective_mode: system_profit
      init_theta_cnn: 0.0
      cool_theta_cnn: 0.0
      menu_use_oracle_eta: true
splits:
  - id: seed0
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 0
  - id: seed1
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 1
  - id: seed2
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 2
