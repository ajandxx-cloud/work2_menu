name: work2_outside_option_robustness
title: Work 2 Outside-Option Robustness
type: policy_compare
study_role: support
robustness_dimension: outside_option_utility
dimension_parameter: outside_option_util
dimension_default: 0.0
dimension_values:
  - -0.5
  - 0.0
  - 0.5
description: >
  Phase 5 sweep over outside-option utility around the Phase 4 baseline. K=10,
  L=3, calibrated MNL/ETA parameters, and home-outside-L semantics are held
  fixed so this isolates opt-out pressure.
reference_tag: oracle_menu_u0
reference_label: Oracle Menu u0=0.0
reference_policy: menu_optimization
base_args:
  experiment_name: work2_outside_option_robustness
  instance: RC
  load_data: true
  fraction_capacity_limited_meeting_points: 0
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 80
  eval_episodes: 20
  menu_k: 3
  max_candidates: 10
  menu_model: cnn_setmenu
  menu_selection_solver: auto
  menu_use_exact_eval: true
  base_util: 1.0
  home_pickup_utility: 1.0
  outside_option_util: 0.0
  incentive_sens: -0.08
  menu_travel_time_weight: -0.0004
  menu_pickup_time_weight: -0.00025
  pref_window_half_width: 5000
  menu_eta_filter_mode: none
  menu_time_prediction_blend: 0.35
  menu_route_delay_lambda: 0.0
  menu_capacity_risk_lambda: 0.0
  cnn_aux_checkpoint: outputs/shared_training/work2_cnn2d_baselineseed0_55278aca/0/checkpoints/supervised_ml.pt
policies:
  - tag: cost_L_um05
    label: Cost-L heuristic u0=-0.5
    policy: cost_l_heuristic
    args_overrides:
      outside_option_util: -0.5
  - tag: cnn_menu_um05
    label: CNN-Menu u0=-0.5
    policy: top_k_cheapest
    args_overrides:
      outside_option_util: -0.5
  - tag: cnn_setmenu_net_um05
    label: CNN-SetMenuNet u0=-0.5
    policy: menu_optimization
    args_overrides:
      outside_option_util: -0.5
      menu_model: cnn_setmenu
  - tag: oracle_menu_um05
    label: Oracle Menu u0=-0.5
    policy: menu_optimization
    args_overrides:
      outside_option_util: -0.5
      menu_model: cnn_setmenu
      init_theta_cnn: 0.0
      cool_theta_cnn: 0.0
      menu_use_oracle_eta: true
  - tag: cost_L_u0
    label: Cost-L heuristic u0=0.0
    policy: cost_l_heuristic
    args_overrides:
      outside_option_util: 0.0
  - tag: cnn_menu_u0
    label: CNN-Menu u0=0.0
    policy: top_k_cheapest
    args_overrides:
      outside_option_util: 0.0
  - tag: cnn_setmenu_net_u0
    label: CNN-SetMenuNet u0=0.0
    policy: menu_optimization
    args_overrides:
      outside_option_util: 0.0
      menu_model: cnn_setmenu
  - tag: oracle_menu_u0
    label: Oracle Menu u0=0.0
    policy: menu_optimization
    args_overrides:
      outside_option_util: 0.0
      menu_model: cnn_setmenu
      init_theta_cnn: 0.0
      cool_theta_cnn: 0.0
      menu_use_oracle_eta: true
  - tag: cost_L_up05
    label: Cost-L heuristic u0=0.5
    policy: cost_l_heuristic
    args_overrides:
      outside_option_util: 0.5
  - tag: cnn_menu_up05
    label: CNN-Menu u0=0.5
    policy: top_k_cheapest
    args_overrides:
      outside_option_util: 0.5
  - tag: cnn_setmenu_net_up05
    label: CNN-SetMenuNet u0=0.5
    policy: menu_optimization
    args_overrides:
      outside_option_util: 0.5
      menu_model: cnn_setmenu
  - tag: oracle_menu_up05
    label: Oracle Menu u0=0.5
    policy: menu_optimization
    args_overrides:
      outside_option_util: 0.5
      menu_model: cnn_setmenu
      init_theta_cnn: 0.0
      cool_theta_cnn: 0.0
      menu_use_oracle_eta: true
splits:
  - id: seed0
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 0
