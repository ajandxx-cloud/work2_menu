name: eta_robustness
title: ETA Robustness Study
type: policy_compare
description: >
  Robustness check comparing four ETA variants: blended (blend=0.35), heuristic-only (blend=0.0),
  oracle ETA (menu_use_oracle_eta=True), and v2 (no ETA filter). Uses the same 6 RC splits as
  rc_main to confirm that the ETA-filtering finding holds across ETA model quality.
reference_tag: full_display
reference_label: full display
reference_policy: offer_all_feasible_bundles
base_args:
  experiment_name: eta_robustness
  instance: RC
  load_data: true
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 12
  eval_episodes: 6
  menu_k: 3
policies:
  - tag: v1_blended
    label: v1 blended ETA
    policy: menu_optimization
    menu_k: 3
    args_overrides:
      menu_time_filtering: true
      menu_time_prediction_blend: 0.35
  - tag: v1_heuristic
    label: v1 heuristic ETA
    policy: menu_optimization
    menu_k: 3
    args_overrides:
      menu_time_filtering: true
      menu_time_prediction_blend: 0.0
  - tag: v1_oracle
    label: v1 oracle ETA
    policy: menu_optimization
    menu_k: 3
    args_overrides:
      menu_time_filtering: true
      menu_use_oracle_eta: true
  - tag: v2
    label: menu optimization v2
    policy: menu_optimization
    menu_k: 3
    args_overrides:
      menu_time_filtering: false
splits:
  - id: rc_0_to_1
    train_split: 0
    test_split: 1
  - id: rc_1_to_0
    train_split: 1
    test_split: 0
  - id: rc_0_to_1_seed2025
    train_split: 0
    test_split: 1
    trace_seed: 2025
    args_overrides:
      seed: 2025
  - id: rc_2_to_3
    train_split: 2
    test_split: 3
  - id: rc_3_to_2
    train_split: 3
    test_split: 2
  - id: rc_4_to_2
    train_split: 4
    test_split: 2
    args_overrides:
      seed: 4242
