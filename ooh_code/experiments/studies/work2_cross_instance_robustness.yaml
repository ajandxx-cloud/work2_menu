name: work2_cross_instance_robustness
title: Work 2 Cross-Instance Robustness
type: policy_compare
study_role: impact
runtime_profile: diagnostic_gap_closure
robustness_dimension: cross_instance_generalization
dimension_parameter: instance
dimension_default: RC
dimension_values:
  - RC
  - Austin
description: >
  Phase 5 diagnostic gap-closure cross-instance stress test on Austin using the Work2 K=10/L=3 framing.
  Austin is not a proof target by itself; it is a diagnostic check for whether
  Phase 4 patterns are brittle outside the RC instance. Caveat: bundled Austin
  split availability differs from RC, so interpret against its own trace. This
  closure evidence cannot support a positive robustness claim by itself.
reference_tag: oracle_menu_austin
reference_label: Oracle Menu Austin
reference_policy: menu_optimization
base_args:
  experiment_name: work2_cross_instance_robustness
  instance: Austin
  load_data: true
  fraction_capacity_limited_meeting_points: 0
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 1
  eval_episodes: 1
  menu_k: 3
  max_candidates: 10
  menu_model: cnn_setmenu
  menu_selection_solver: auto
  menu_use_exact_eval: true
  base_util: 1.0
  home_pickup_utility: 1.0
  outside_option_util: 0.0
  incentive_sens: -0.08
  menu_travel_time_weight: -0.0004
  menu_pickup_time_weight: -0.00025
  pref_window_half_width: 5000
  menu_eta_filter_mode: none
  menu_time_prediction_blend: 0.35
  menu_route_delay_lambda: 0.0
  menu_capacity_risk_lambda: 0.0
  cnn_aux_checkpoint: outputs/shared_training/work2_cnn2d_baselineseed0_55278aca/0/checkpoints/supervised_ml.pt
policies:
  - tag: cost_L_austin
    label: Cost-L heuristic Austin
    policy: cost_l_heuristic
  - tag: cnn_menu_austin
    label: CNN-Menu Austin
    policy: top_k_cheapest
  - tag: cnn_setmenu_net_austin
    label: CNN-SetMenuNet Austin
    policy: menu_optimization
    args_overrides:
      menu_model: cnn_setmenu
  - tag: oracle_menu_austin
    label: Oracle Menu Austin
    policy: menu_optimization
    args_overrides:
      menu_model: cnn_setmenu
      init_theta_cnn: 0.0
      cool_theta_cnn: 0.0
      menu_use_oracle_eta: true
splits:
  - id: austin_seed0
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 0
