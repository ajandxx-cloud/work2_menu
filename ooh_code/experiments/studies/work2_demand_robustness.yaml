name: work2_demand_robustness
title: Work 2 Demand Robustness
type: policy_compare
study_role: support
runtime_profile: diagnostic_gap_closure
robustness_dimension: demand_intensity
dimension_parameter: max_steps_r
dimension_default: 700
dimension_values:
  - 490
  - 700
  - 910
description: >
  Phase 5 diagnostic gap-closure sweep over low, baseline, and high demand intensity using max_steps_r.
  K=10, L=3, and home-outside-L semantics match the Phase 4 Work2 pilot. Results
  should be read conservatively because Phase 4 evidence was mixed. This closure
  evidence is diagnostic only and cannot support a positive robustness claim by itself.
reference_tag: oracle_menu_demand10
reference_label: Oracle Menu demand=1.0x
reference_policy: menu_optimization
base_args:
  experiment_name: work2_demand_robustness
  instance: RC
  load_data: true
  fraction_capacity_limited_meeting_points: 0
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 1
  eval_episodes: 1
  menu_k: 3
  max_candidates: 10
  max_steps_r: 700
  menu_model: cnn_setmenu
  menu_selection_solver: auto
  menu_use_exact_eval: true
  base_util: 1.0
  home_pickup_utility: 1.0
  outside_option_util: 0.0
  incentive_sens: -0.08
  menu_travel_time_weight: -0.0004
  menu_pickup_time_weight: -0.00025
  pref_window_half_width: 5000
  menu_eta_filter_mode: none
  menu_time_prediction_blend: 0.35
  menu_route_delay_lambda: 0.0
  menu_capacity_risk_lambda: 0.0
  cnn_aux_checkpoint: outputs/shared_training/work2_cnn2d_baselineseed0_55278aca/0/checkpoints/supervised_ml.pt
policies:
  - tag: cost_L_demand07
    label: Cost-L heuristic demand=0.7x
    policy: cost_l_heuristic
    args_overrides:
      max_steps_r: 490
  - tag: cost_L_demand10
    label: Cost-L heuristic demand=1.0x
    policy: cost_l_heuristic
    args_overrides:
      max_steps_r: 700
  - tag: cnn_menu_demand10
    label: CNN-Menu demand=1.0x
    policy: top_k_cheapest
    args_overrides:
      max_steps_r: 700
  - tag: cnn_setmenu_net_demand10
    label: CNN-SetMenuNet demand=1.0x
    policy: menu_optimization
    args_overrides:
      max_steps_r: 700
      menu_model: cnn_setmenu
  - tag: cost_L_demand13
    label: Cost-L heuristic demand=1.3x
    policy: cost_l_heuristic
    args_overrides:
      max_steps_r: 910
  - tag: oracle_menu_demand10
    label: Oracle Menu demand=1.0x
    policy: menu_optimization
    args_overrides:
      max_steps_r: 700
      menu_model: cnn_setmenu
      init_theta_cnn: 0.0
      cool_theta_cnn: 0.0
      menu_use_oracle_eta: true
splits:
  - id: seed0
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 0
