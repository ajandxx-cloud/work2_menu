name: rc_main_optout
title: RC Main Opt-out Validation
type: policy_compare
study_role: mechanism
description: >
  Re-run of rc_main with the updated MNL model that includes an explicit outside option (u_0=0).
  Confirms that adding the outside option does not break the v2 win-rate result — the core finding
  must hold under the corrected model. Uses the same 6 splits and 6 policies as rc_main.
reference_tag: full_display
reference_label: full display
reference_policy: offer_all_feasible_bundles
headline_variants:
  - full_display
  - menu_optimization
  - menu_optimization_v2
base_args:
  experiment_name: rc_main_optout
  instance: RC
  load_data: true
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 12
  eval_episodes: 6
  menu_k: 3
policies:
  - menu_optimization
  - tag: menu_optimization_v2
    label: menu optimization v2
    policy: menu_optimization
    menu_k: 3
    args_overrides:
      menu_time_filtering: false
  - revenue_greedy
  - nearest_heuristic
  - top_k_cheapest
  - top_k_passenger_utility
splits:
  - id: rc_0_to_1
    train_split: 0
    test_split: 1
  - id: rc_1_to_0
    train_split: 1
    test_split: 0
  - id: rc_0_to_1_seed2025
    train_split: 0
    test_split: 1
    trace_seed: 2025
    args_overrides:
      seed: 2025
  - id: rc_2_to_3
    train_split: 2
    test_split: 3
  - id: rc_3_to_2
    train_split: 3
    test_split: 2
  - id: rc_4_to_2
    train_split: 4
    test_split: 2
    args_overrides:
      seed: 4242
