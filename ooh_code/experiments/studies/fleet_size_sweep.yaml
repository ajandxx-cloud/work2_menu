name: fleet_size_sweep
title: Fleet Size Sweep
type: policy_compare
description: >
  Sweep over fleet sizes 10, 15 (baseline), and 20 vehicles on the RC benchmark.
  Compares menu_optimization_v2 against full_display for each fleet size across
  all 6 RC splits to assess generalization beyond the baseline operating regime.
reference_tag: full_display
reference_label: full display
reference_policy: offer_all_feasible_bundles
base_args:
  experiment_name: fleet_size_sweep
  instance: RC
  load_data: true
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 12
  eval_episodes: 6
  menu_k: 3
policies:
  - tag: v2_fleet10
    label: v2 fleet=10
    policy: menu_optimization
    menu_k: 3
    args_overrides:
      menu_time_filtering: false
      n_vehicles: 10
  - tag: v2_fleet15
    label: v2 fleet=15 (baseline)
    policy: menu_optimization
    menu_k: 3
    args_overrides:
      menu_time_filtering: false
      n_vehicles: 15
  - tag: v2_fleet20
    label: v2 fleet=20
    policy: menu_optimization
    menu_k: 3
    args_overrides:
      menu_time_filtering: false
      n_vehicles: 20
splits:
  - id: rc_0_to_1
    train_split: 0
    test_split: 1
  - id: rc_1_to_0
    train_split: 1
    test_split: 0
  - id: rc_0_to_1_seed2025
    train_split: 0
    test_split: 1
    trace_seed: 2025
    args_overrides:
      seed: 2025
  - id: rc_2_to_3
    train_split: 2
    test_split: 3
  - id: rc_3_to_2
    train_split: 3
    test_split: 2
  - id: rc_4_to_2
    train_split: 4
    test_split: 2
    args_overrides:
      seed: 4242
