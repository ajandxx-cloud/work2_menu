name: work2_austin_main
title: Work 2 Austin Main — CNN-SetMenuNet on Real-World Data
type: policy_compare
description: >
  CNN-SetMenuNet (set-attention) on the Austin instance from the Amazon Last
  Mile Routing Challenge dataset.  The auxiliary CNN_2d for ETA/IVT prediction
  is warm-started from the work2_austin_cnn2d baseline checkpoint, ensuring
  fair comparison.  Austin has 700 customers and 278 meeting points on real
  road-network distances — a much harder ranking problem than RC (90 customers,
  10 meeting points, Euclidean distances).
reference_tag: full_display
reference_label: full display
reference_policy: offer_all_feasible_bundles
base_args:
  experiment_name: work2_austin_main
  instance: Austin
  load_data: true
  fraction_capacity_limited_meeting_points: 0
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 40
  eval_episodes: 10
  menu_k: 3
  max_candidates: 10
  menu_model: cnn_setmenu
  menu_selection_solver: auto
  menu_use_exact_eval: true
  # --- MNL / ETA parameters: identical to work2_austin_cnn2d ---
  base_util: 1.0
  home_pickup_utility: 1.0
  outside_option_util: 0.0
  incentive_sens: -0.08
  menu_travel_time_weight: -0.0004
  menu_pickup_time_weight: -0.00025
  pref_window_half_width: 5000
  menu_eta_filter_mode: none
  menu_time_prediction_blend: 0.35
  menu_route_delay_lambda: 0.0
  menu_capacity_risk_lambda: 0.0
  # --- Auxiliary CNN_2d warm-start for ETA/IVT ---
  # Placeholder: will be set per-split after CNN-2d baseline completes.
  # The manifest_hash changes when this path is updated, so set it via
  # per-split args_overrides to keep base hash stable.
  cnn_aux_checkpoint: ""
policies:
  - tag: nearest_L
    label: Nearest-L
    policy: nearest_heuristic
  - tag: cost_L
    label: Cost-L
    policy: cost_l_heuristic
  - tag: cnn_menu
    label: CNN-Menu
    policy: top_k_cheapest
  - tag: cnn_setmenu_net
    label: CNN-SetMenuNet
    policy: menu_optimization
  - tag: oracle_menu
    label: Oracle Menu
    policy: menu_optimization
    args_overrides:
      init_theta_cnn: 0.0
      cool_theta_cnn: 0.0
      menu_use_oracle_eta: true
splits:
  - id: seed0
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 0
      cnn_aux_checkpoint: outputs/shared_training/work2_austin_cnn2dseed0/0/checkpoints/supervised_ml.pt
  - id: seed1
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 1
      cnn_aux_checkpoint: outputs/shared_training/work2_austin_cnn2dseed1/1/checkpoints/supervised_ml.pt
