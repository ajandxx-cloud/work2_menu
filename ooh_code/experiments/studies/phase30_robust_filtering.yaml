name: phase30_robust_filtering
title: Phase 30 Robust ETA Filtering
type: policy_compare
study_role: mechanism
description: >
  Robust ETA filtering comparison on the RC benchmark. The study contrasts hard
  thresholding, calibrated probabilistic filtering, interval-overlap filtering,
  and no ETA filtering under the same menu-value solver.
reference_tag: full_display
reference_label: full display
reference_policy: offer_all_feasible_bundles
headline_variants:
  - full_display
  - hard_filter
  - calibrated_filter
  - interval_filter
  - no_filter
base_args:
  experiment_name: phase30_robust_filtering
  instance: RC
  load_data: true
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 4
  eval_episodes: 2
  max_steps_r: 80
  max_steps_p: 0.5
  menu_k: 3
  candidate_meeting_points: 6
  menu_window_slots_each_side: 0
  menu_selection_solver: auto
  menu_time_prediction_blend: 0.35
policies:
  - tag: hard_filter
    label: hard ETA filter
    policy: menu_optimization
    menu_k: 3
    args_overrides:
      menu_time_filtering: true
      menu_eta_filter_mode: hard
  - tag: calibrated_filter
    label: calibrated ETA filter
    policy: menu_optimization
    menu_k: 3
    args_overrides:
      menu_time_filtering: true
      menu_eta_filter_mode: calibrated
  - tag: interval_filter
    label: interval-overlap ETA filter
    policy: menu_optimization
    menu_k: 3
    args_overrides:
      menu_time_filtering: true
      menu_eta_filter_mode: interval
  - tag: no_filter
    label: no ETA filter
    policy: menu_optimization
    menu_k: 3
    args_overrides:
      menu_time_filtering: false
      menu_eta_filter_mode: none
splits:
  - id: rc_0_to_1
    train_split: 0
    test_split: 1
  - id: rc_1_to_0
    train_split: 1
    test_split: 0
  - id: rc_0_to_1_seed2025
    train_split: 0
    test_split: 1
    trace_seed: 2025
    args_overrides:
      seed: 2025
  - id: rc_2_to_3
    train_split: 2
    test_split: 3
  - id: rc_3_to_2
    train_split: 3
    test_split: 2
  - id: rc_4_to_2
    train_split: 4
    test_split: 2
    args_overrides:
      seed: 4242
