name: phase22_uptake_calibration
title: Phase 22 Higher-Uptake RC Calibration
type: policy_compare
study_role: mechanism
description: >
  First-pass higher-uptake RC regime for Phase 22 using a mixed minimal-change
  calibration. The regime raises shared baseline utility, softens time/price
  penalties, and widens the preferred pickup window so RC leaves the current
  near-universal opt-out zone while preserving paired evaluation against full display.
reference_tag: full_display
reference_label: full display
reference_policy: offer_all_feasible_bundles
headline_variants:
  - full_display
  - menu_optimization
behavior_gate:
  min_acceptance_rate: 0.10
  max_acceptance_rate: 0.60
  max_opt_out_rate: 0.95
base_args:
  experiment_name: phase22_uptake_calibration
  instance: RC
  load_data: true
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 12
  eval_episodes: 6
  menu_k: 3
  menu_time_filtering: true
  menu_eta_filter_mode: hard
  menu_eta_variant: deployed
  menu_time_prediction_blend: 0.35
  base_util: 1.0
  home_pickup_utility: 1.0
  pref_window_half_width: 1500
  incentive_sens: -0.08
  menu_travel_time_weight: -0.0008
  menu_pickup_time_weight: -0.0005
policies:
  - tag: menu_optimization
    label: menu optimization higher-uptake regime
    policy: menu_optimization
    menu_k: 3
    args_overrides:
      menu_time_filtering: true
      menu_eta_filter_mode: hard
      menu_eta_variant: deployed
      menu_time_prediction_blend: 0.35
splits:
  - id: rc_0_to_1
    train_split: 0
    test_split: 1
  - id: rc_1_to_0
    train_split: 1
    test_split: 0
  - id: rc_0_to_1_seed2025
    train_split: 0
    test_split: 1
    trace_seed: 2025
    args_overrides:
      seed: 2025
  - id: rc_2_to_3
    train_split: 2
    test_split: 3
  - id: rc_3_to_2
    train_split: 3
    test_split: 2
  - id: rc_4_to_2
    train_split: 4
    test_split: 2
    args_overrides:
      seed: 4242
