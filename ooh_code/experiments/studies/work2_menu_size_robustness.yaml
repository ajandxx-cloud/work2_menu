name: work2_menu_size_robustness
title: Work 2 Menu Size Robustness
type: policy_compare
study_role: support
robustness_dimension: menu_size
dimension_parameter: menu_k
dimension_default: 3
dimension_values:
  - 2
  - 3
  - 5
description: >
  Phase 5 sweep over public L, the number of displayed meeting-point offers.
  Home pickup remains always shown outside L. Uses compact pilot budgets and
  the Phase 4 Work2 calibration because Phase 4 evidence was mixed rather than
  confirmatory.
reference_tag: oracle_menu_L3
reference_label: Oracle Menu L=3
reference_policy: menu_optimization
base_args:
  experiment_name: work2_menu_size_robustness
  instance: RC
  load_data: true
  fraction_capacity_limited_meeting_points: 0
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 80
  eval_episodes: 20
  menu_k: 3
  max_candidates: 10
  menu_model: cnn_setmenu
  menu_selection_solver: auto
  menu_use_exact_eval: true
  base_util: 1.0
  home_pickup_utility: 1.0
  outside_option_util: 0.0
  incentive_sens: -0.08
  menu_travel_time_weight: -0.0004
  menu_pickup_time_weight: -0.00025
  pref_window_half_width: 5000
  menu_eta_filter_mode: none
  menu_time_prediction_blend: 0.35
  menu_route_delay_lambda: 0.0
  menu_capacity_risk_lambda: 0.0
  cnn_aux_checkpoint: outputs/shared_training/work2_cnn2d_baselineseed0_55278aca/0/checkpoints/supervised_ml.pt
policies:
  - tag: cost_L_L2
    label: Cost-L heuristic L=2
    policy: cost_l_heuristic
    args_overrides:
      menu_k: 2
  - tag: cnn_menu_L2
    label: CNN-Menu L=2
    policy: top_k_cheapest
    args_overrides:
      menu_k: 2
  - tag: cnn_setmenu_net_L2
    label: CNN-SetMenuNet L=2
    policy: menu_optimization
    args_overrides:
      menu_k: 2
      menu_model: cnn_setmenu
  - tag: oracle_menu_L2
    label: Oracle Menu L=2
    policy: menu_optimization
    args_overrides:
      menu_k: 2
      menu_model: cnn_setmenu
      init_theta_cnn: 0.0
      cool_theta_cnn: 0.0
      menu_use_oracle_eta: true
  - tag: cost_L_L3
    label: Cost-L heuristic L=3
    policy: cost_l_heuristic
    args_overrides:
      menu_k: 3
  - tag: cnn_menu_L3
    label: CNN-Menu L=3
    policy: top_k_cheapest
    args_overrides:
      menu_k: 3
  - tag: cnn_setmenu_net_L3
    label: CNN-SetMenuNet L=3
    policy: menu_optimization
    args_overrides:
      menu_k: 3
      menu_model: cnn_setmenu
  - tag: oracle_menu_L3
    label: Oracle Menu L=3
    policy: menu_optimization
    args_overrides:
      menu_k: 3
      menu_model: cnn_setmenu
      init_theta_cnn: 0.0
      cool_theta_cnn: 0.0
      menu_use_oracle_eta: true
  - tag: cost_L_L5
    label: Cost-L heuristic L=5
    policy: cost_l_heuristic
    args_overrides:
      menu_k: 5
  - tag: cnn_menu_L5
    label: CNN-Menu L=5
    policy: top_k_cheapest
    args_overrides:
      menu_k: 5
  - tag: cnn_setmenu_net_L5
    label: CNN-SetMenuNet L=5
    policy: menu_optimization
    args_overrides:
      menu_k: 5
      menu_model: cnn_setmenu
  - tag: oracle_menu_L5
    label: Oracle Menu L=5
    policy: menu_optimization
    args_overrides:
      menu_k: 5
      menu_model: cnn_setmenu
      init_theta_cnn: 0.0
      cool_theta_cnn: 0.0
      menu_use_oracle_eta: true
splits:
  - id: seed0
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 0
