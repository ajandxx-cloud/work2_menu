name: phase32_operational_baselines
title: Phase 32 Operational Baseline Comparisons
type: policy_compare
study_role: support
description: >
  DRT operational baselines providing dispatch-floor and greedy-policy context
  for the menu-optimization results. All baselines run under the RC low-uptake
  regime to match the primary mechanism benchmark.
reference_tag: full_display
reference_label: full display
reference_policy: offer_all_feasible_bundles
policies:
  - tag: full_display
    label: full display
    policy: offer_all_feasible_bundles
  - tag: strict_filter
    label: strict-filter heuristic
    policy: menu_optimization
    menu_k: 3
    args_overrides:
      menu_time_filtering: true
      menu_eta_filter_mode: hard
      menu_eta_variant: deployed
      menu_time_prediction_blend: 0.35
      menu_pricing_mode: lambertw
  - tag: insertion_cost_greedy
    label: insertion-cost greedy
    policy: insertion_cost_greedy
    menu_k: 3
    args_overrides:
      menu_time_filtering: true
      menu_eta_filter_mode: hard
      menu_eta_variant: deployed
      menu_time_prediction_blend: 0.35
      menu_pricing_mode: lambertw
  - tag: min_lateness
    label: minimum-lateness ranking
    policy: min_lateness
    menu_k: 3
    args_overrides:
      menu_time_filtering: true
      menu_eta_filter_mode: hard
      menu_eta_variant: deployed
      menu_time_prediction_blend: 0.35
      menu_pricing_mode: lambertw
  - tag: random_top_k
    label: random-top-k floor
    policy: random_top_k
    menu_k: 3
    args_overrides:
      menu_time_filtering: true
      menu_eta_filter_mode: hard
      menu_eta_variant: deployed
      menu_time_prediction_blend: 0.35
      menu_pricing_mode: lambertw
behavior_gate:
  min_acceptance_rate: 0.02
  max_acceptance_rate: 0.60
  max_opt_out_rate: 0.98
base_args:
  experiment_name: phase32_operational_baselines
  instance: RC
  load_data: true
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 12
  eval_episodes: 6
  menu_k: 3
  base_util: -2.0
  home_pickup_utility: 3.2
  pref_window_half_width: 600
  incentive_sens: -0.25
  menu_travel_time_weight: -0.002
  menu_pickup_time_weight: -0.0015
splits:
  - id: rc_0_to_1
    train_split: 0
    test_split: 1
  - id: rc_1_to_0
    train_split: 1
    test_split: 0
  - id: rc_0_to_1_seed2025
    train_split: 0
    test_split: 1
    trace_seed: 2025
    args_overrides:
      seed: 2025
  - id: rc_2_to_3
    train_split: 2
    test_split: 3
  - id: rc_3_to_2
    train_split: 3
    test_split: 2
  - id: rc_4_to_2
    train_split: 4
    test_split: 2
    args_overrides:
      seed: 4242
