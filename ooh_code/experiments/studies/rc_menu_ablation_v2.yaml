name: rc_menu_ablation_v2
title: RC Menu Component Ablations (v2 baseline)
type: ablation
description: >
  RC ablation study using menu_optimization_v2 (no time_filtering, keep_home=true) as the
  baseline. Removes one component at a time to verify which components of v2 contribute
  positively. Reuses the same shared predictor and replayed traces as rc_main.
reference_tag: full_display
reference_label: full display
reference_policy: offer_all_feasible_bundles
baseline_variant:
  tag: menu_optimization_v2
  label: menu optimization v2
  policy: menu_optimization
  menu_k: 3
  args_overrides:
    menu_time_filtering: false
ablations:
  - tag: v2_no_capacity_risk_penalty
    label: v2 no capacity-risk penalty
    args_overrides:
      menu_time_filtering: false
      menu_capacity_risk_lambda: 0.0
  - tag: v2_no_route_delay_penalty
    label: v2 no route-delay penalty
    args_overrides:
      menu_time_filtering: false
      menu_route_delay_lambda: 0.0
  - tag: v2_add_time_filtering
    label: v2 with time filtering restored
    args_overrides:
      menu_time_filtering: true
  - tag: v2_no_keep_home
    label: v2 no forced home retention
    args_overrides:
      menu_time_filtering: false
      menu_keep_home: false
base_args:
  experiment_name: rc_menu_ablation_v2
  instance: RC
  load_data: true
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 12
  eval_episodes: 6
  menu_k: 3
splits:
  - id: rc_0_to_1
    train_split: 0
    test_split: 1
  - id: rc_1_to_0
    train_split: 1
    test_split: 0
  - id: rc_0_to_1_seed2025
    train_split: 0
    test_split: 1
    trace_seed: 2025
    args_overrides:
      seed: 2025
