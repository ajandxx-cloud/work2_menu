name: work2_phase08_gap_closure_smoke
title: Work 2 Phase08 Gap Closure Smoke - Service Parameter Grid
type: policy_compare
description: >
  Minimal smoke study for the Phase08 gap-closure service penalty/guardrail
  grid. This validates the expanded manifest before the 3-seed diagnostic.
reference_tag: full_display
reference_label: full display
reference_policy: offer_all_feasible_bundles
base_args:
  experiment_name: work2_phase08_gap_closure_smoke
  instance: RC
  load_data: true
  fraction_capacity_limited_meeting_points: 0
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 1
  eval_episodes: 1
  menu_k: 3
  candidate_meeting_points: 10
  max_candidates: 10
  menu_model: cnn_setmenu
  menu_selection_solver: exact
  menu_use_exact_eval: true
  menu_exact_threshold: 8
  menu_objective_mode: system_profit
  service_quit_penalty: 100.0
  service_quit_rate_guardrail: 0.4
  base_util: 1.0
  home_pickup_utility: 1.0
  outside_option_util: 0.0
  incentive_sens: -0.08
  menu_travel_time_weight: -0.0004
  menu_pickup_time_weight: -0.00025
  pref_window_half_width: 5000
  menu_eta_filter_mode: none
  menu_time_prediction_blend: 0.35
  menu_route_delay_lambda: 0.25
  menu_capacity_risk_lambda: 0.1
  cnn_aux_checkpoint: outputs/shared_training/work2_cnn2d_baselineseed0_55278aca/0/checkpoints/supervised_ml.pt
