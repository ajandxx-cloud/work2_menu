name: work2_remediation_formal
title: Work 2 Remediation Formal - System-Profit Objective
type: policy_compare
description: >
  Phase 7 formal remediation manifest. Run only after work2_remediation_pilot
  supports the system_profit objective without guardrail failure. This does
  not replace Phase 6 work2_formal_main evidence.
reference_tag: full_display
reference_label: full display
reference_policy: offer_all_feasible_bundles
base_args:
  experiment_name: work2_remediation_formal
  instance: RC
  load_data: true
  fraction_capacity_limited_meeting_points: 0
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 150
  eval_episodes: 50
  menu_k: 3
  max_candidates: 10
  menu_model: cnn_setmenu
  menu_selection_solver: auto
  menu_use_exact_eval: true
  menu_objective_mode: system_profit
  base_util: 1.0
  home_pickup_utility: 1.0
  outside_option_util: 0.0
  incentive_sens: -0.08
  menu_travel_time_weight: -0.0004
  menu_pickup_time_weight: -0.00025
  pref_window_half_width: 5000
  menu_eta_filter_mode: none
  menu_time_prediction_blend: 0.35
  menu_route_delay_lambda: 0.5
  menu_capacity_risk_lambda: 0.1
  cnn_aux_checkpoint: outputs/shared_training/work2_cnn2d_baselineseed0_55278aca/0/checkpoints/supervised_ml.pt
policies:
  - tag: nearest_L
    label: Nearest-L
    policy: nearest_heuristic
  - tag: cost_L
    label: Cost-L heuristic
    policy: cost_l_heuristic
  - tag: cnn_menu
    label: CNN-Menu
    policy: top_k_cheapest
  - tag: mlp_menu
    label: MLP-Menu
    policy: menu_optimization
    args_overrides:
      menu_model: mlp_menu
      menu_objective_mode: system_profit
  - tag: setmenu_net
    label: SetMenuNet
    policy: menu_optimization
    args_overrides:
      menu_model: mlp_menu
      menu_objective_mode: system_profit
  - tag: cnn_setmenu_net
    label: CNN-SetMenuNet
    policy: menu_optimization
    args_overrides:
      menu_model: cnn_setmenu
      menu_objective_mode: system_profit
  - tag: oracle_menu
    label: Oracle Menu
    policy: menu_optimization
    args_overrides:
      menu_model: cnn_setmenu
      menu_objective_mode: system_profit
      init_theta_cnn: 0.0
      cool_theta_cnn: 0.0
      menu_use_oracle_eta: true
splits:
  - id: seed0
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 0
  - id: seed1
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 1
  - id: seed2
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 2
  - id: seed3
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 3
  - id: seed4
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 4
