name: rc_menu_ablation
title: RC Menu Component Ablations
type: ablation
description: >
  RC ablation study that removes one menu-optimization component at a time while reusing the
  same shared predictor and replayed traces. The bundled RC data only ships split files 0 and 1,
  so the third run reuses 0->1 with a different random seed and trace seed as a low-intensity
  replication.
reference_tag: full_display
reference_label: full display
reference_policy: offer_all_feasible_bundles
baseline_variant:
  tag: menu_optimization
  label: menu optimization
  policy: menu_optimization
  menu_k: 3
ablations:
  - tag: no_time_filtering
    label: no time filtering
    args_overrides:
      menu_time_filtering: false
  - tag: no_keep_home
    label: no forced home retention
    args_overrides:
      menu_keep_home: false
  - tag: no_route_delay_penalty
    label: no route-delay penalty
    args_overrides:
      menu_route_delay_lambda: 0.0
  - tag: no_capacity_risk_penalty
    label: no capacity-risk penalty
    args_overrides:
      menu_capacity_risk_lambda: 0.0
base_args:
  experiment_name: rc_menu_ablation
  instance: RC
  load_data: true
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 12
  eval_episodes: 6
  menu_k: 3
splits:
  - id: rc_0_to_1
    train_split: 0
    test_split: 1
  - id: rc_1_to_0
    train_split: 1
    test_split: 0
  - id: rc_0_to_1_seed2025
    train_split: 0
    test_split: 1
    trace_seed: 2025
    args_overrides:
      seed: 2025
