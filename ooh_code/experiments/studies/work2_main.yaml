name: work2_main
title: Work 2 Main Experiment — 6-Method Comparison
type: policy_compare
description: >
  Compares Nearest-L, Cost-L, CNN-Menu, SetMenuNet, CNN-SetMenuNet,
  and Oracle Menu on RC instance with K=10, L=3.
reference_tag: full_display
reference_label: full display
reference_policy: offer_all_feasible_bundles
base_args:
  experiment_name: work2_main
  instance: RC
  load_data: true
  fraction_capacity_limited_meeting_points: 0
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 80
  eval_episodes: 20
  menu_k: 3
  max_candidates: 10
  menu_selection_solver: auto
  menu_use_exact_eval: true
policies:
  - tag: nearest_L
    label: Nearest-L
    policy: nearest_heuristic
  - tag: cost_L
    label: Cost-L
    policy: cost_l_heuristic
  - tag: cnn_menu
    label: CNN-Menu
    policy: top_k_cheapest
  - tag: setmenu_net
    label: SetMenuNet
    policy: menu_optimization
    args_overrides:
      menu_model: mlp_menu
  - tag: cnn_setmenu_net
    label: CNN-SetMenuNet
    policy: menu_optimization
    args_overrides:
      menu_model: cnn_setmenu
  - tag: oracle_menu
    label: Oracle Menu
    policy: menu_optimization
    args_overrides:
      menu_model: cnn_setmenu
      init_theta_cnn: 0.0
      cool_theta_cnn: 0.0
      menu_use_oracle_eta: true
splits:
  - id: seed0
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 0
  - id: seed1
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 1
  - id: seed2
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 2
