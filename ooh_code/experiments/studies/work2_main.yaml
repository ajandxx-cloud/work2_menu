name: work2_main
title: Work 2 Main Experiment - 6-Method Phase 4 Pilot
type: policy_compare
description: >
  Phase 4 pilot comparing Nearest-L, Cost-L heuristic, CNN-Menu,
  MLP-Menu, CNN-SetMenuNet, and Oracle Menu on RC instance with K=10, L=3.
  All methods share a single CNNSetMenuNet model trained with
  offer_all_feasible_bundles, differing only in menu selection policy.
  This is a three-seed pilot; formal 150-300/50 episode evidence remains
  later-phase scope.
reference_tag: full_display
reference_label: full display
reference_policy: offer_all_feasible_bundles
base_args:
  experiment_name: work2_main
  instance: RC
  load_data: true
  fraction_capacity_limited_meeting_points: 0
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 80
  eval_episodes: 20
  menu_k: 3          # L: displayed meeting-point offers; home is always shown outside L
  max_candidates: 10 # K: meeting-point candidates; tensors use candidate_slots = K + 1
  menu_model: cnn_setmenu
  menu_selection_solver: auto
  menu_use_exact_eval: true
  # --- MNL / ETA parameters: calibrated for meaningful acceptance rates ---
  # Based on phase31_high (best existing config, ~0.9% acceptance) with
  # further reduced time weights to compensate for raw IVT/deviation scale.
  # Expected: ~20-30% acceptance, menu_size ~= L=3
  base_util: 1.0
  home_pickup_utility: 1.0
  outside_option_util: 0.0
  incentive_sens: -0.08
  menu_travel_time_weight: -0.0004
  menu_pickup_time_weight: -0.00025
  # ETA filter: disabled. The _choose_display_window function has TWO stages:
  # Stage 1: pref_window_half_width feasibility gate (was widened 1500->5000, no effect)
  # Stage 2: display_window_half_width=150 slot matching (+/-750s total coverage)
  # Stage 2 was the real bottleneck - pruning stayed at 85.6% regardless of
  # pref_window width. With mode=none, no candidates are pruned by ETA;
  # each gets assigned to the nearest display window slot, and MNL handles
  # time preferences through its utility function.
  pref_window_half_width: 5000
  menu_eta_filter_mode: none
  menu_time_prediction_blend: 0.35
  # --- Greedy optimizer penalties: set to 0 to prevent over-penalization ---
  # Default menu_route_delay_lambda=1.0 adds ~5000 penalty units on top of
  # predicted_cost~36, causing premature greedy stopping and menus of size 1.9
  # instead of L=3. With lambdas=0, greedy uses pure predicted_cost like other
  # policies, enabling fair comparison of model prediction quality.
  menu_route_delay_lambda: 0.0
  menu_capacity_risk_lambda: 0.0
  # --- Auxiliary CNN_2d warm-start for ETA/IVT prediction ---
  # Without this, cnn_aux gets zeros for ETA/IVT targets during initial
  # training and NO training during online episodes (_cnnaux_update = pass).
  # This causes ETA MAE ~12000s, destroying acceptance rates.
  # Warm-starting from a pre-trained CNN_2d checkpoint gives good ETA/IVT
  # predictions, isolating the contribution to cost prediction + menu design.
  cnn_aux_checkpoint: outputs/shared_training/work2_cnn2d_baselineseed0_55278aca/0/checkpoints/supervised_ml.pt
policies:
  - tag: nearest_L
    label: Nearest-L
    policy: nearest_heuristic
  - tag: cost_L
    label: Cost-L heuristic
    policy: cost_l_heuristic
  - tag: cnn_menu
    label: CNN-Menu
    policy: top_k_cheapest
  - tag: mlp_menu
    label: MLP-Menu
    policy: menu_optimization
    args_overrides:
      menu_model: mlp_menu
  - tag: cnn_setmenu_net
    label: CNN-SetMenuNet
    policy: menu_optimization
    args_overrides:
      menu_model: cnn_setmenu
  - tag: oracle_menu
    label: Oracle Menu
    policy: menu_optimization
    args_overrides:
      menu_model: cnn_setmenu
      init_theta_cnn: 0.0
      cool_theta_cnn: 0.0
      menu_use_oracle_eta: true
splits:
  - id: seed0
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 0
  - id: seed1
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 1
  - id: seed2
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 2
