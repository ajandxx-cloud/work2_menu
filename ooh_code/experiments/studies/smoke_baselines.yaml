name: smoke_baselines
title: Baseline Consolidation Smoke Test
type: policy_compare
description: >
  Verify all 4 baseline menu policies (home_only, nearest_heuristic, cost_l_heuristic,
  top_k_cheapest) produce valid results on RC instance across 3 seeds.
reference_tag: full_display
reference_label: full display
reference_policy: offer_all_feasible_bundles
base_args:
  experiment_name: smoke_baselines
  instance: RC
  load_data: false
  fraction_capacity_limited_meeting_points: 0
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 1
  eval_episodes: 1
  max_steps_r: 1
  max_steps_p: 0.5
  n_vehicles: 2
  veh_capacity: 2
  menu_k: 3
policies:
  - home_only
  - nearest_heuristic
  - cost_l_heuristic
  - top_k_cheapest
splits:
  - id: baseline_seed0
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 0
  - id: baseline_seed1
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 1
  - id: baseline_seed2
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 2
