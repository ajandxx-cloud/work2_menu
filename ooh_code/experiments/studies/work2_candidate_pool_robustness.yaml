name: work2_candidate_pool_robustness
title: Work 2 Candidate Pool Robustness
type: policy_compare
study_role: support
robustness_dimension: candidate_pool_size
dimension_parameter: max_candidates
dimension_default: 10
dimension_values:
  - 6
  - 10
  - 15
description: >
  Phase 5 sweep over public K, the number of meeting-point candidates. Neural
  tensors use candidate_slots = K + 1 because home is always represented in
  addition to meeting-point candidates. This is a compact robustness stress
  test, not positive-claim evidence by itself.
reference_tag: oracle_menu_K10
reference_label: Oracle Menu K=10
reference_policy: menu_optimization
base_args:
  experiment_name: work2_candidate_pool_robustness
  instance: RC
  load_data: true
  fraction_capacity_limited_meeting_points: 0
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 80
  eval_episodes: 20
  menu_k: 3
  max_candidates: 10
  menu_model: cnn_setmenu
  menu_selection_solver: auto
  menu_use_exact_eval: true
  base_util: 1.0
  home_pickup_utility: 1.0
  outside_option_util: 0.0
  incentive_sens: -0.08
  menu_travel_time_weight: -0.0004
  menu_pickup_time_weight: -0.00025
  pref_window_half_width: 5000
  menu_eta_filter_mode: none
  menu_time_prediction_blend: 0.35
  menu_route_delay_lambda: 0.0
  menu_capacity_risk_lambda: 0.0
  cnn_aux_checkpoint: outputs/shared_training/work2_cnn2d_baselineseed0_55278aca/0/checkpoints/supervised_ml.pt
policies:
  - tag: cost_L_K6
    label: Cost-L heuristic K=6
    policy: cost_l_heuristic
    args_overrides:
      max_candidates: 6
  - tag: cnn_menu_K6
    label: CNN-Menu K=6
    policy: top_k_cheapest
    args_overrides:
      max_candidates: 6
  - tag: cnn_setmenu_net_K6
    label: CNN-SetMenuNet K=6
    policy: menu_optimization
    args_overrides:
      max_candidates: 6
      menu_model: cnn_setmenu
  - tag: oracle_menu_K6
    label: Oracle Menu K=6
    policy: menu_optimization
    args_overrides:
      max_candidates: 6
      menu_model: cnn_setmenu
      init_theta_cnn: 0.0
      cool_theta_cnn: 0.0
      menu_use_oracle_eta: true
  - tag: cost_L_K10
    label: Cost-L heuristic K=10
    policy: cost_l_heuristic
    args_overrides:
      max_candidates: 10
  - tag: cnn_menu_K10
    label: CNN-Menu K=10
    policy: top_k_cheapest
    args_overrides:
      max_candidates: 10
  - tag: cnn_setmenu_net_K10
    label: CNN-SetMenuNet K=10
    policy: menu_optimization
    args_overrides:
      max_candidates: 10
      menu_model: cnn_setmenu
  - tag: oracle_menu_K10
    label: Oracle Menu K=10
    policy: menu_optimization
    args_overrides:
      max_candidates: 10
      menu_model: cnn_setmenu
      init_theta_cnn: 0.0
      cool_theta_cnn: 0.0
      menu_use_oracle_eta: true
  - tag: cost_L_K15
    label: Cost-L heuristic K=15
    policy: cost_l_heuristic
    args_overrides:
      max_candidates: 15
  - tag: cnn_menu_K15
    label: CNN-Menu K=15
    policy: top_k_cheapest
    args_overrides:
      max_candidates: 15
  - tag: cnn_setmenu_net_K15
    label: CNN-SetMenuNet K=15
    policy: menu_optimization
    args_overrides:
      max_candidates: 15
      menu_model: cnn_setmenu
  - tag: oracle_menu_K15
    label: Oracle Menu K=15
    policy: menu_optimization
    args_overrides:
      max_candidates: 15
      menu_model: cnn_setmenu
      init_theta_cnn: 0.0
      cool_theta_cnn: 0.0
      menu_use_oracle_eta: true
splits:
  - id: seed0
    train_split: 0
    test_split: 1
    args_overrides:
      seed: 0
