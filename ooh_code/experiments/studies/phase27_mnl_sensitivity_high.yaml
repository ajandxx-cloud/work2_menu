name: phase27_mnl_sensitivity_high
title: Phase 27 MNL Sensitivity - Higher-Uptake Stress-Test Regime
type: ablation
study_role: support
description: >
  Current-pipeline MNL sensitivity check under the higher-uptake RC stress-test
  calibration used for pricing and welfare interpretation in v1.6 and v1.7.
reference_tag: full_display
reference_label: full display
reference_policy: offer_all_feasible_bundles
baseline_variant:
  tag: strict_filter
  label: strict-filter heuristic
  policy: menu_optimization
  menu_k: 3
  args_overrides:
    menu_time_filtering: true
    menu_eta_filter_mode: hard
    menu_eta_variant: deployed
    menu_time_prediction_blend: 0.35
    menu_pricing_mode: lambertw
ablations:
  - tag: no_filter
    label: no-filter heuristic
    policy: menu_optimization
    menu_k: 3
    args_overrides:
      menu_time_filtering: false
      menu_pricing_mode: lambertw
  - tag: flat_markdown
    label: flat markdown pricing
    policy: menu_optimization
    menu_k: 3
    args_overrides:
      menu_time_filtering: true
      menu_eta_filter_mode: hard
      menu_eta_variant: deployed
      menu_time_prediction_blend: 0.35
      menu_pricing_mode: flat_markdown
      menu_pricing_constant: -3.0
behavior_gate:
  min_acceptance_rate: 0.10
  max_acceptance_rate: 0.60
  max_opt_out_rate: 0.95
base_args:
  experiment_name: phase27_mnl_sensitivity_high
  instance: RC
  load_data: true
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 12
  eval_episodes: 6
  menu_k: 3
  base_util: 1.0
  home_pickup_utility: 1.0
  pref_window_half_width: 1500
  incentive_sens: -0.08
  menu_travel_time_weight: -0.0008
  menu_pickup_time_weight: -0.0005
splits:
  - id: rc_0_to_1
    train_split: 0
    test_split: 1
  - id: rc_1_to_0
    train_split: 1
    test_split: 0
  - id: rc_0_to_1_seed2025
    train_split: 0
    test_split: 1
    trace_seed: 2025
    args_overrides:
      seed: 2025
  - id: rc_2_to_3
    train_split: 2
    test_split: 3
  - id: rc_3_to_2
    train_split: 3
    test_split: 2
  - id: rc_4_to_2
    train_split: 4
    test_split: 2
    args_overrides:
      seed: 4242
