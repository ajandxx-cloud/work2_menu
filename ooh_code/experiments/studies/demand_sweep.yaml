name: demand_sweep
title: Demand Intensity Sweep
type: policy_compare
description: >
  Sweep over demand intensities 0.7x (max_steps_r=490), 1.0x baseline (max_steps_r=700),
  and 1.3x (max_steps_r=910) on the RC benchmark. Compares menu_optimization_v2 against
  full_display for each demand level across all 6 RC splits.
reference_tag: full_display
reference_label: full display
reference_policy: offer_all_feasible_bundles
base_args:
  experiment_name: demand_sweep
  instance: RC
  load_data: true
  save_model: true
  log_output: file
  debug: true
  seed: 1234
  max_episodes: 12
  eval_episodes: 6
  menu_k: 3
policies:
  - tag: v2_demand07
    label: v2 demand=0.7x
    policy: menu_optimization
    menu_k: 3
    args_overrides:
      menu_time_filtering: false
      max_steps_r: 490
  - tag: v2_demand10
    label: v2 demand=1.0x (baseline)
    policy: menu_optimization
    menu_k: 3
    args_overrides:
      menu_time_filtering: false
      max_steps_r: 700
  - tag: v2_demand13
    label: v2 demand=1.3x
    policy: menu_optimization
    menu_k: 3
    args_overrides:
      menu_time_filtering: false
      max_steps_r: 910
splits:
  - id: rc_0_to_1
    train_split: 0
    test_split: 1
  - id: rc_1_to_0
    train_split: 1
    test_split: 0
  - id: rc_0_to_1_seed2025
    train_split: 0
    test_split: 1
    trace_seed: 2025
    args_overrides:
      seed: 2025
  - id: rc_2_to_3
    train_split: 2
    test_split: 3
  - id: rc_3_to_2
    train_split: 3
    test_split: 2
  - id: rc_4_to_2
    train_split: 4
    test_split: 2
    args_overrides:
      seed: 4242
