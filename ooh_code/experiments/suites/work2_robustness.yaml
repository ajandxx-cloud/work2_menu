name: work2_robustness
title: Work 2 Robustness Suite
type: suite
description: >
  Phase 5 robustness suite for Work 2. This suite consumes the mixed and
  inconclusive Phase 4 pilot evidence as diagnostic input; it is a stress test
  across EXP-07 dimensions, not a pre-commitment to a positive CNN-SetMenuNet
  claim. Public K is meeting-point candidates, public L is displayed meeting
  points, and home is always shown outside L.
members:
  - work2_menu_size_robustness
  - work2_candidate_pool_robustness
  - work2_demand_robustness
  - work2_outside_option_robustness
  - work2_cross_instance_robustness
